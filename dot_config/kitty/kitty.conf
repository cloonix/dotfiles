# kitty.conf — minimal configuration with best practices
# Docs: https://sw.kovidgoyal.net/kitty/conf/

# =============================================================================
# FONT
# =============================================================================

font_family      family="Cousine Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size        14.0

# Ligatures and common OpenType features
font_features CousineNFM-Regular +liga +calt +kern
font_features CousineNFM-Bold    +liga +calt +kern

# Map Nerd Font symbol ranges explicitly (fallback if symbols aren't in main font)
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ed00-U+efc1,U+f000-U+f2ff,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

# =============================================================================
# CURSOR
# =============================================================================

cursor_shape          beam
# 0 disables blinking
cursor_blink_interval 0

# =============================================================================
# SCROLLBACK
# =============================================================================

scrollback_lines 10000

# =============================================================================
# MOUSE
# =============================================================================

# auto-copy selection to clipboard
copy_on_select         yes
# strip trailing whitespace only when pasting (not affecting display)
strip_trailing_spaces  smart

# =============================================================================
# PERFORMANCE
# =============================================================================

# ms between repaints (~120 fps cap); lower = more responsive feel
repaint_delay  8
# ms of input read delay before processing; lower = snappier input
input_delay    1
# avoid vsync-induced input lag
sync_to_monitor no

# =============================================================================
# BELL
# =============================================================================

enable_audio_bell no
visual_bell_duration 0.0

# =============================================================================
# WINDOW
# =============================================================================

# px padding inside the window
window_padding_width   0
remember_window_size   yes
initial_window_width   120c
initial_window_height  36c

# ask before closing a window with a running process
confirm_os_window_close 1

# =============================================================================
# TAB BAR
# =============================================================================

tab_bar_style           powerline
tab_powerline_style     round
tab_bar_edge            top
tab_bar_align           left
tab_bar_min_tabs        1
tab_bar_margin_height   0.0  0.0

tab_title_template      "{index}: {title}"
tab_title_max_length    30

#tab_bar_background      #1a181a

# =============================================================================
# SHELL INTEGRATION
# =============================================================================

# Enables OSC 133 marks, cwd tracking, and prompt navigation
shell_integration enabled

# =============================================================================
# KEYBOARD SHORTCUTS
# =============================================================================

# Use kitty_mod (cmd) as the modifier
kitty_mod cmd

# -- Tabs --
map kitty_mod+t new_tab_with_cwd
map kitty_mod+w close_tab
map kitty_mod+right next_tab
map kitty_mod+left  previous_tab
map kitty_mod+1 goto_tab 1
map kitty_mod+2 goto_tab 2
map kitty_mod+3 goto_tab 3
map kitty_mod+4 goto_tab 4
map kitty_mod+5 goto_tab 5
map kitty_mod+6 goto_tab 6
map kitty_mod+7 goto_tab 7
map kitty_mod+8 goto_tab 8
map kitty_mod+9 goto_tab 9

# -- Windows (splits) --
map kitty_mod+enter new_window_with_cwd
map kitty_mod+]     next_window
map kitty_mod+[     previous_window

# -- Font size --
map kitty_mod+equal  change_font_size all +0.5
map kitty_mod+minus  change_font_size all -0.5
# 0 resets font size to default
map kitty_mod+0      change_font_size all 0

# -- Scrollback --
map kitty_mod+h show_scrollback

# -- Config reload --
map kitty_mod+F5 load_config_file

# =============================================================================
# URLS
# =============================================================================

open_url_with  default
url_style      curly
detect_urls    yes


# BEGIN_KITTY_THEME
# Sonokai Sushia
include current-theme.conf
# END_KITTY_THEME

# Tab colors — must come AFTER the theme include to override it
active_tab_foreground   #1a181a
active_tab_background   #ab9df2
active_tab_font_style   bold

inactive_tab_foreground #848089
inactive_tab_background #403d41
inactive_tab_font_style normal
