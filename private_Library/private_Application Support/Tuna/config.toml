schemaVersion = 1

[catalogConfiguration]
customFolders = []
scriptsDirectories = []

    [[catalogConfiguration.folderDepthOverrides]]
    catalogIdentifier = 'TunaAutomation.ScriptsCatalog'
    depthRawValue = 3

    [[catalogConfiguration.folderDepthOverrides]]
    catalogIdentifier = 'TunaCore.UserFoldersCatalog'
    depthRawValue = 1

[extensions]
enabledIdentifiers = [ 'com.brnbw.tuna.plugins.obsidian' ]

[hotkeys]
custom = []

    [hotkeys.app.activate]
    carbonKeyCode = 49
    carbonModifiers = 2048

    [hotkeys.app.dictation]
    carbonKeyCode = 9
    carbonModifiers = 6912

    [hotkeys.app.leaderMode]
    carbonKeyCode = 49
    carbonModifiers = 4096

    [hotkeys.app.textMode]
    carbonKeyCode = 49
    carbonModifiers = 6912

